<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Conversion History</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/superbcss@latest/dist/superb.min.css">
    <style>
        body {
            margin: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: center;
        }
        th {
            background-color: #007BFF;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        a.back-btn {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            background-color: #007BFF;
            color: white;
            text-decoration: none;
            border-radius: 0.25rem;
        }
        a.back-btn:hover {
            background-color: #0056b3;
        }
        h1 {
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Saved Conversions</h1>

    {% if saved and saved|length > 0 %}
    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>From</th>
                <th>To</th>
                <th>Amount</th>
                <th>Result</th>
            </tr>
        </thead>
        <tbody>
            {% for item in saved %}
            <tr>
                <td>{{ item.from_currency }}</td>
                <td>{{ item.to_currency }}</td>
                <td>{{ item.amount }}</td>
                <td>{{ item.result }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>No conversions saved yet.</p>
    {% endif %}

    <a href="/" class="back-btn">Back to Converter</a>
</div>

</body>
</html>
