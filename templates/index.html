<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 500px;
        }
        h1 { margin-top: 0; color: #1a73e8; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            background: #1a73e8;
            color: white;
        }
        .save-btn { background: #34a853; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f0fe;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .error {
            margin-top: 20px;
            padding: 15px;
            background: #fce8e6;
            border-radius: 8px;
            color: #d93025;
        }
        .history-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #1a73e8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Currency Converter</h1>

        <form method="POST" action="/convert">
            <label>Amount</label>
            <input type="number" name="amount" step="0.01" required>

            <label>From Currency</label>
            <select name="from_cur" required>
                <option value="" disabled selected>Select</option>
                {% for currency in currencies %}
                <option value="{{ currency }}">{{ currency }}</option>
                {% endfor %}
            </select>

            <label>To Currency</label>
            <select name="to_cur" required>
                <option value="" disabled selected>Select</option>
                {% for currency in currencies %}
                <option value="{{ currency }}">{{ currency }}</option>
                {% endfor %}
            </select>

            <div class="button-group">
                <button type="submit" name="convert">Convert</button>
                <button type="submit" name="save" class="save-btn">Convert & Save</button>
            </div>
        </form>

        {% if result %}
        <div class="result">Result: {{ result }}</div>
        {% endif %}

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <a href="/history" class="history-link">View Saved Conversions</a>
    </div>
</body>
</html>
